<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>新德租赁 | 智能设备租赁管理系统</title>
    <!-- 引入字体与图标库 -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 整体布局 */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        /* ========= 侧边栏样式 - 移动端默认隐藏，通过汉堡菜单激活 ========= */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.08);
            transition: transform 0.25s ease-in-out;
            z-index: 1000;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            transform: translateX(-100%);
            overflow-y: auto;
        }

        /* 侧边栏打开状态 */
        .sidebar.open {
            transform: translateX(0);
        }

        /* 桌面端侧边栏常驻 */
        @media (min-width: 992px) {
            .sidebar {
                transform: translateX(0);
                position: relative;
                z-index: 10;
            }

            .menu-toggle {
                display: none !important;
            }

            .sidebar-overlay {
                display: none !important;
            }
        }

        /* 移动端遮罩层 */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* 品牌区域 */
        .brand {
            padding: 24px 20px;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
        }

        .brand h1 {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand p {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 6px;
            font-weight: 400;
        }

        /* 导航菜单 */
        .nav-menu {
            flex: 1;
            padding: 0 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-item i {
            width: 22px;
            font-size: 1.2rem;
            text-align: center;
        }

        .nav-item:hover {
            background: #1e293b;
            color: white;
        }

        .nav-item.active {
            background: #2d3a5e;
            color: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        /* 分组标题 */
        .nav-group-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 16px 16px 8px 16px;
            color: #5b6e8c;
            font-weight: 600;
        }

        /* 底部技术支持 */
        .sidebar-footer {
            padding: 20px 16px 24px;
            border-top: 1px solid #2d3a4e;
            font-size: 0.7rem;
            color: #6c7f9c;
            text-align: center;
            line-height: 1.4;
        }

        /* ========= 右侧主内容 ========= */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #f8fafc;
            width: 100%;
        }

        /* 顶部栏 - 移动端增加汉堡菜单按钮 */
        .top-bar {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e9edf2;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #1e293b;
            cursor: pointer;
            padding: 8px;
            margin-right: 8px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-toggle:hover {
            background: #f1f5f9;
        }

        .page-title {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e293b, #2c3e66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex: 1;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-area i {
            font-size: 1.2rem;
            color: #5b6e8c;
            cursor: pointer;
            transition: color 0.2s;
        }

        .user-area i:hover {
            color: #2c3e66;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: #eef2ff;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #2c3e66;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* 内容区域卡片网格 */
        .content-pane {
            padding: 20px 16px;
        }

        /* 桌面端增加内边距 */
        @media (min-width: 768px) {
            .content-pane {
                padding: 28px 32px;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .top-bar {
                padding: 14px 28px;
            }
        }

        /* 快捷卡片区 (工作台概览) 移动端自适应 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (min-width: 640px) {
            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
            }
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            border: 1px solid #edf2f7;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -12px rgba(0, 0, 0, 0.1);
        }

        .stat-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #5b6e8c;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-number {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f172a;
        }

        @media (min-width: 768px) {
            .stat-number {
                font-size: 2rem;
            }
        }

        /* 表格卡片 - 移动端滚动 */
        .data-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #eef2f8;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            overflow-x: auto;
        }

        @media (min-width: 768px) {
            .data-card {
                padding: 20px 24px;
                margin-bottom: 28px;
            }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
        }

        @media (min-width: 768px) {
            .card-header h3 {
                font-size: 1.25rem;
            }
        }

        .badge-action {
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #2c3e66;
            cursor: default;
            white-space: nowrap;
        }

        /* 搜索栏样式 - 优化体验 */
        .search-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
            background: white;
            padding: 6px 16px;
            border-radius: 48px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .search-bar:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-bar i {
            color: #94a3b8;
            font-size: 1rem;
        }

        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 0.95rem;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .search-bar input::placeholder {
            color: #cbd5e1;
        }

        .search-clear {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .search-clear:hover {
            color: #475569;
            background: #f1f5f9;
        }
/* 移动端订单表格优化：横向滚动更友好 + 卡片化增强 */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 850px;
        }
        /* 移动端稍微减少最小宽度，确保关键字段可见但不会过挤，同时允许滚动 */
        @media (max-width: 640px) {
            table {
                min-width: 780px;
            }
        }
        th {
            text-align: left;
            padding: 12px 12px 12px 0;
            font-weight: 600;
            color: #475569;
            border-bottom: 1px solid #e9edf2;
            font-size: 0.8rem;
        }
        td {
            padding: 14px 12px 14px 0;
            border-bottom: 1px solid #f0f2f5;
            font-size: 0.85rem;
            color: #1f2a44;
        }
        .status-badge {
            background: #dcfce7;
            color: #15803d;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            white-space: nowrap;
        }
        .status-warning { background: #fff3e3; color: #b45309; }
        .status-overdue { background: #fee2e2; color: #b91c1c; }
        .clue-item {
            background: #fefce8;
            border-left: 4px solid #eab308;
            padding: 10px 12px;
            border-radius: 14px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) {
            .two-columns { grid-template-columns: 1fr 1fr; gap: 24px; }
        }
        .copyright {
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            padding: 16px 0 8px;
            border-top: 1px solid #e2e8f0;
            margin-top: 12px;
        }
        .no-result {
            text-align: center;
            padding: 48px 20px;
            color: #94a3b8;
        }
        .no-result i { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }

        /* ========= 右侧垂直Logo：移动端放大一倍 ========= */
        .vertical-company {
            position: fixed;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-family: system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-weight: 900;
            font-size: 0.7rem;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #e55a32, #b83a1a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 18px rgba(210, 80, 40, 0.5);
            white-space: nowrap;
            z-index: 99;
            pointer-events: none;
            opacity: 0.85;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08));
        }

        /* 移动端（手机）Logo放大一倍：原0.55rem → 放大到1.1rem (接近翻倍) */
        @media (max-width: 640px) {
            .vertical-company {
                font-size: 1.1rem;    /* 相对手机基础0.55rem放大一倍多，视觉显著增强 */
                letter-spacing: 5px;
                right: 6px;
                opacity: 0.9;
            }
            body {
                padding-right: 1.2rem;
            }
        }

        /* 平板电脑适当增大比例（比手机略小但比原0.7大） */
        @media (min-width: 641px) and (max-width: 991px) {
            .vertical-company {
                font-size: 0.95rem;    /* 比原版0.7稍大，增强可见 */
                letter-spacing: 7px;
                right: 12px;
            }
        }

        /* 桌面端保持适度大小，但相比原设计稍微精致些 */
        @media (min-width: 992px) {
            .vertical-company {
                font-size: 0.9rem;
                letter-spacing: 6px;
                right: 20px;
                opacity: 0.7;
            }
        }
        @media (min-width: 1440px) {
            .vertical-company {
                font-size: 1rem;
                letter-spacing: 8px;
            }
        }

        /* 移动端表格内字体微调提升触控 */
        @media (max-width: 640px) {
            td, th {
                font-size: 0.8rem;
            }
            td .status-badge {
                font-size: 0.65rem;
                padding: 3px 8px;
            }
            .badge-action {
                font-size: 0.65rem;
            }
        }
        .btn-icon {
            color: #3b6e9e;
            cursor: pointer;
            margin-right: 8px;
        }
    </style>
</head>

        // 辅助函数：转义HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 根据状态返回样式类
        function getStatusClass(statusType, status) {
            if (statusType === 'overdue' || status === '逾期') return 'status-overdue';
            if (status === '待归还' || status === '待发货') return 'status-warning';
            return 'status-badge';
        }

        // 渲染订单表格（高性能，直接操作DOM字符串）
        function renderOrdersTable(orderList) {
            if (!orderList || orderList.length === 0) {
                return `
                <div class="no-result">
                    <i class="fas fa-search"></i>
                    <p>未找到相关订单，请尝试其他关键词</p>
                </div>
            `;
            }

            const rows = orderList.map(order => {
                const statusClass = getStatusClass(order.statusType, order.status);
                return `
                <tr>
                    <td><strong>${escapeHtml(order.id)}</strong></td>
                    <td>${escapeHtml(order.customer)}</td>
                    <td>${escapeHtml(order.product)}</td>
                    <td style="white-space: nowrap;">${escapeHtml(order.period)}</td>
                    <td>${escapeHtml(order.account)}</td>
                    <td>${escapeHtml(order.收款账户)}</td>
                    <td><strong>${escapeHtml(order.amount)}</strong></td>
                    <td><span class="${statusClass}">${escapeHtml(order.status)}</span></td>
                </tr>
            `;
            }).join('');

            return `
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>订单编号</th><th>客户名称</th><th>租赁产品</th><th>起止时间</th><th>打卡银行</th><th>收款账户</th><th>总金额</th><th>状态</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        `;
        }

        // 订单视图控制器（优化检索性能，无卡顿）
        let currentFilter = '';
        let ordersContainerElement = null;

        // 核心过滤函数
        function getFilteredOrders() {
            if (!currentFilter.trim()) return ordersData;
            const keyword = currentFilter.trim().toLowerCase();
            return ordersData.filter(order =>
                order.id.toLowerCase().includes(keyword) ||
                order.customer.toLowerCase().includes(keyword)
